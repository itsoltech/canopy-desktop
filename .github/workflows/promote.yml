name: Promote

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  promote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create PR from next to main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --base main \
            --head next \
            --title "chore: promote next to main" \
            --body "Automated promotion of \`next\` branch to \`main\` for stable release." \
            || echo "PR already exists"
          gh pr merge --auto --merge next
