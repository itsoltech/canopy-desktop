name: Auto Merge

on:
  workflow_run:
    workflows: [CI, PR Labels]
    types: [completed]
  pull_request:
    types: [labeled]
  pull_request_review:
    types: [submitted, dismissed]

concurrency:
  group: auto-merge-${{ github.event.pull_request.head.ref || github.event.workflow_run.head_branch || github.ref }}
  cancel-in-progress: true

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: read
    steps:
      - name: Resolve PR number
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ github.event_name }}" = "pull_request_review" ]; then
            echo "number=${{ github.event.pull_request.number }}" >> "$GITHUB_OUTPUT"
          else
            NUMBER=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls" --jq '.[0].number // empty')
            if [ -z "$NUMBER" ]; then
              echo "No PR found for this workflow run"
              exit 0
            fi
            echo "number=$NUMBER" >> "$GITHUB_OUTPUT"
          fi

      - name: Check PR is open
        id: state
        if: steps.pr.outputs.number
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATE=$(gh pr view "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --json state --jq '.state')
          if [ "$STATE" != "OPEN" ]; then
            echo "PR #${{ steps.pr.outputs.number }} is $STATE, skipping"
          fi
          echo "open=$( [ "$STATE" = "OPEN" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Check required label
        id: label
        if: steps.state.outputs.open == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HAS=$(gh pr view "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --json labels --jq '[.labels[].name] | any(. == "claude:review:approved")')
          echo "approved=$HAS" >> "$GITHUB_OUTPUT"

      - name: Check no changes requested
        id: reviews
        if: steps.label.outputs.approved == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DECISION=$(gh pr view "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --json reviewDecision --jq '.reviewDecision')
          if [ "$DECISION" = "CHANGES_REQUESTED" ]; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Check all status checks passed
        id: checks
        if: steps.label.outputs.approved == 'true' && steps.reviews.outputs.blocked != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          FAILED=$(gh pr checks "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --json name,state --jq '[.[] | select(.name != "auto-merge" and .state != "SUCCESS" and .state != "SKIPPED")] | length')
          if [ "$FAILED" = "0" ]; then
            echo "all_passed=true" >> "$GITHUB_OUTPUT"
          else
            echo "all_passed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Squash merge
        if: steps.checks.outputs.all_passed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr merge "${{ steps.pr.outputs.number }}" --repo "${{ github.repository }}" --squash --delete-branch --auto
