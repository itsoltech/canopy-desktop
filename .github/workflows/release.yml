name: Release

on:
  push:
    branches: [main, next]
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Build without publishing (dry run)'
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  # ── Determine version ─────────────────────────────────────────
  release-version:
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
      tag: ${{ steps.semantic.outputs.new_release_git_tag }}
      notes: ${{ steps.semantic.outputs.new_release_notes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true
          token: ${{ secrets.RELEASE_TOKEN }}

      - uses: volta-cli/action@v4

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
            conventional-changelog-conventionalcommits
          dry_run: ${{ inputs.dry_run }}
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}

      - name: Summary
        if: steps.semantic.outputs.new_release_published == 'true'
        run: |
          echo "## Release v${{ steps.semantic.outputs.new_release_version }}" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.semantic.outputs.new_release_notes }}" >> $GITHUB_STEP_SUMMARY

      - name: No release needed
        if: steps.semantic.outputs.new_release_published != 'true'
        run: echo "No releasable commits since last tag." >> $GITHUB_STEP_SUMMARY

  # ── Build all platforms ────────────────────────────────────────
  build:
    needs: release-version
    if: >-
      needs.release-version.outputs.published == 'true'
      || (inputs.dry_run)
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: '--arm64 --x64'
            label: universal
          - os: ubuntu-latest
            platform: linux
            arch: ''
            label: linux
          - os: windows-latest
            platform: win
            arch: ''
            label: win
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.dry_run && github.sha || needs.release-version.outputs.tag }}
      - uses: volta-cli/action@v4
      - run: npm ci

      - name: Build and publish
        if: needs.release-version.outputs.published == 'true' && !inputs.dry_run
        run: npm run build && npx --no-install electron-builder --publish always ${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: ${{ matrix.platform == 'mac' && secrets.CSC_LINK || '' }}
          CSC_KEY_PASSWORD: ${{ matrix.platform == 'mac' && secrets.CSC_KEY_PASSWORD || '' }}
          APPLE_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_ID || '' }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ matrix.platform == 'mac' && secrets.APPLE_APP_SPECIFIC_PASSWORD || '' }}
          APPLE_TEAM_ID: ${{ matrix.platform == 'mac' && secrets.APPLE_TEAM_ID || '' }}

      - name: Build (dry run)
        if: inputs.dry_run
        run: npm run build && npx --no-install electron-builder --publish never ${{ matrix.arch }}
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts (dry run)
        if: inputs.dry_run
        uses: actions/upload-artifact@v4
        with:
          name: canopy-${{ matrix.label }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
            dist/*.yml
          retention-days: 7

  # ── Finalize release ───────────────────────────────────────────
  finalize:
    needs: [release-version, build]
    if: needs.release-version.outputs.published == 'true' && !inputs.dry_run
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Set release notes and publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.release-version.outputs.tag }}
          NOTES: ${{ needs.release-version.outputs.notes }}
          VERSION: ${{ needs.release-version.outputs.version }}
        run: |
          PRERELEASE_FLAG=""
          if [[ "$VERSION" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release edit "$TAG" \
            --repo "$GH_REPO" \
            --notes "$NOTES" \
            --draft=false \
            $PRERELEASE_FLAG
