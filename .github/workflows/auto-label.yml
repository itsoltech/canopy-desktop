name: Auto Label

on:
  issues:
    types: [opened]
  pull_request:
    types: [opened]

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Read label prompt
        id: prompt
        run: echo "content<<EOF" >> $GITHUB_OUTPUT && cat .github/prompts/auto-label.md >> $GITHUB_OUTPUT && echo "EOF" >> $GITHUB_OUTPUT

      - name: Auto Label Issue
        if: github.event_name == 'issues'
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: 'claude,dependabot'
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE NUMBER: ${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}
            BODY: ${{ github.event.issue.body }}

            ${{ steps.prompt.outputs.content }}
          claude_args: |
            --model haiku
            --allowedTools "Bash(gh issue edit:*),Bash(gh issue view:*)"

      - name: Auto Label PR
        if: github.event_name == 'pull_request'
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: 'claude,dependabot'
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}
            TITLE: ${{ github.event.pull_request.title }}
            BODY: ${{ github.event.pull_request.body }}

            ${{ steps.prompt.outputs.content }}
          claude_args: |
            --model haiku
            --allowedTools "Bash(gh pr edit:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"
