name: PR Labels

on:
  pull_request:
    types: [opened, labeled, unlabeled, synchronize]

concurrency:
  group: pr-labels-${{ github.event.pull_request.head.ref }}
  cancel-in-progress: true

jobs:
  check-labels:
    runs-on: ubuntu-latest
    steps:
      - name: Check required labels
        uses: mheap/github-action-required-labels@v5
        with:
          mode: minimum
          count: 1
          labels: 'claude:review:approved'
