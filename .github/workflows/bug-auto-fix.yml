name: Bug Auto-Fix

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: bug-auto-fix-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  fix:
    if: contains(github.event.issue.labels.*.name, 'bug')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: next
          fetch-depth: 0

      - uses: volta-cli/action@v4

      - name: Install dependencies
        run: npm ci

      - name: Read fix prompt
        id: prompt
        run: |
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          cat .github/prompts/bug-auto-fix.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Apply bug auto-fix
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: 'claude'
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            ISSUE_NUMBER: ${{ github.event.issue.number }}
            TITLE: ${{ github.event.issue.title }}
            BODY: ${{ github.event.issue.body }}
            AUTHOR: ${{ github.event.issue.user.login }}
            BASE_BRANCH: next
            WORK_BRANCH: claude/auto-fix/issue-${{ github.event.issue.number }}

            ${{ steps.prompt.outputs.content }}
          claude_args: |
            --model opus[1m]
            --effort max
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(gh api:*),Bash(gh issue view:*),Bash(gh issue comment:*),Bash(gh pr create:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr comment:*),Bash(git checkout:*),Bash(git switch:*),Bash(git fetch:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git status:*),Bash(git diff:*),Bash(git log:*),Bash(git blame:*),Bash(git branch:*),Bash(npm run lint:*),Bash(npm run format:*),Bash(npm run typecheck:*),Bash(npm run svelte-check:*)"
          settings: |
            {
              "env": {
                "ANTHROPIC_AUTH_TOKEN": "${{ secrets.ANTHROPIC_AUTH_TOKEN }}",
                "ANTHROPIC_BASE_URL": "${{ secrets.ANTHROPIC_BASE_URL }}"
              }
            }
