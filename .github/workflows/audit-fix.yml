name: Audit Fix

on:
  pull_request_review:
    types: [submitted]

concurrency:
  group: audit-fix-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  fix:
    if: >-
      github.event.review.user.login == 'claude[bot]'
      && startsWith(github.event.pull_request.head.ref, 'audit/')
      && !contains(toJSON(github.event.pull_request.labels.*.name), 'audit-fixes-applied')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 1

      - uses: volta-cli/action@v4

      - name: Install dependencies
        run: npm ci

      - name: Read fix prompt
        id: prompt
        run: |
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          cat .github/prompts/audit-fix.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Apply review fixes
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: 'claude'
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR_NUMBER: ${{ github.event.pull_request.number }}
            BRANCH: ${{ github.event.pull_request.head.ref }}

            ${{ steps.prompt.outputs.content }}
          claude_args: |
            --model opus[1m]
            --effort max
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(gh api:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git diff:*),Bash(git status:*),Bash(npm run lint:*),Bash(npm run format:*)"
          settings: |
            {
              "env": {
                "ANTHROPIC_AUTH_TOKEN": "${{ secrets.ANTHROPIC_AUTH_TOKEN }}",
                "ANTHROPIC_BASE_URL": "${{ secrets.ANTHROPIC_BASE_URL }}"
              }
            }

      - name: Mark fixes applied
        run: gh pr edit ${{ github.event.pull_request.number }} --add-label "audit-fixes-applied"
        env:
          GH_TOKEN: ${{ github.token }}
