name: Auto Fix

on:
  pull_request:
    types: [labeled]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

concurrency:
  group: auto-fix-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

jobs:
  fix:
    if: >-
      (github.event_name == 'pull_request'
        && github.event.label.name == 'auto-fix')
      || (github.event_name == 'pull_request_review'
        && github.event.review.state == 'changes_requested'
        && github.event.review.user.type == 'User'
        && contains(github.event.review.body, '@claude'))
      || (github.event_name == 'issue_comment'
        && github.event.issue.pull_request != null
        && github.event.comment.user.type == 'User'
        && contains(github.event.comment.body, '@claude'))
      || (github.event_name == 'pull_request_review_comment'
        && github.event.comment.user.type == 'User'
        && contains(github.event.comment.body, '@claude'))
      || (github.event_name == 'pull_request_review_comment'
        && github.event.comment.user.login == 'claude[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number || github.event.issue.number }}"
          HEAD_REF=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json headRefName --jq .headRefName)
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 1

      - uses: volta-cli/action@v4

      - name: Install dependencies
        run: npm ci

      - name: Read fix prompt
        id: prompt
        run: |
          echo "content<<EOF" >> "$GITHUB_OUTPUT"
          cat .github/prompts/auto-fix.md >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Apply auto-fix
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: 'claude'
          claude_code_oauth_token: ${{ secrets.ANTHROPIC_AUTH_TOKEN }}
          prompt: |
            REPO: ${{ github.repository }}
            PR_NUMBER: ${{ steps.pr.outputs.number }}
            BRANCH: ${{ steps.pr.outputs.head_ref }}
            TRIGGER: ${{ github.event_name }}
            TRIGGER_ACTOR: ${{ github.event.sender.login }}
            TRIGGERING_COMMENT_ID: ${{ github.event.comment.id }}
            TRIGGERING_COMMENT_URL: ${{ github.event.comment.html_url }}

            ${{ steps.prompt.outputs.content }}
          claude_args: |
            --model opus[1m]
            --effort max
            --allowedTools "Read,Write,Edit,Glob,Grep,Bash(gh api:*),Bash(gh pr view:*),Bash(gh pr diff:*),Bash(gh pr comment:*),Bash(git add:*),Bash(git commit:*),Bash(git push:*),Bash(git diff:*),Bash(git status:*),Bash(npm run lint:*),Bash(npm run format:*)"
          settings: |
            {
              "env": {
                "ANTHROPIC_AUTH_TOKEN": "${{ secrets.ANTHROPIC_AUTH_TOKEN }}",
                "ANTHROPIC_BASE_URL": "${{ secrets.ANTHROPIC_BASE_URL }}"
              }
            }
