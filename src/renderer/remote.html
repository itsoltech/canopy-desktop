<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1e1e1e" />
    <!-- Belt-and-suspenders anti-cache hints for Safari on iOS. The HTTP
         response headers are the authoritative source, but iOS Safari has
         a history of aggressive HTML document caching that ignores
         `Cache-Control: no-store` alone, so these meta tags act as a
         secondary signal. -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Canopy Remote</title>
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' ws: wss:"
    />
  </head>

  <body>
    <div id="app"></div>
    <script src="/electron-shim.js"></script>
    <script type="module" src="./src/remote/remote-main.ts"></script>
  </body>
</html>
